name: Create release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.7"
  GODOT_RELEASE_TYPE: stable

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare export directories
        run: mkdir -p builds/linux builds/windows builds/macos

      - name: Export GodotHub
        uses: firebelley/godot-export@v8.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE_TYPE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE_TYPE }}_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE_TYPE }}/Godot_v${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE_TYPE }}_export_templates.tpz
          relative_project_path: .
          use_preset_export_path: true

      - name: Build AppImage
        run: |
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool packaging/appimage/build.sh
          APPIMAGETOOL="$PWD/appimagetool" packaging/appimage/build.sh \
            builds/linux/GodotHub.x86_64 builds/appimage/GodotHub-x86_64.AppImage

      - name: Package release assets
        run: |
          mkdir -p dist
          chmod +x builds/linux/GodotHub.x86_64
          (cd builds/linux && zip -9 -q ../../dist/GodotHub-Linux.zip GodotHub.x86_64)
          (cd builds/windows && zip -9 -q ../../dist/GodotHub-Windows.zip GodotHub.exe)
          cp builds/macos/GodotHub.zip dist/GodotHub-macOS.zip
          cp builds/appimage/GodotHub-x86_64.AppImage dist/GodotHub-x86_64.AppImage

          # v1.1 clients only recognize these two legacy asset names.
          cp dist/GodotHub-Linux.zip dist/Linux.zip
          cp dist/GodotHub-Windows.zip dist/Windows.zip

          (cd dist && sha512sum GodotHub-*.zip GodotHub-*.AppImage > SHA512-SUMS.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GodotHub-${{ github.ref_name }}
          path: dist/*

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1.18.0
        with:
          tag: ${{ github.ref_name }}
          name: GodotHub ${{ github.ref_name }}
          generateReleaseNotes: true
          makeLatest: true
          artifacts: dist/*
